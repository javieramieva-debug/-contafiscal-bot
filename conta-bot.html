<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conta · Asistente ContaFiscal MX</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b3e;
    --blue: #2563eb;
    --blue2: #3b82f6;
    --gold: #f59e0b;
    --bg: #f0f4f8;
    --white: #ffffff;
    --gray: #e8edf4;
    --gray2: #c8d4e4;
    --tx: #0f1923;
    --tx2: #4a5e78;
    --tx3: #8a9ab0;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { background: var(--navy); padding: 0 20px; height: 64px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; box-shadow: 0 2px 20px rgba(0,0,0,0.3); }
  .avatar { width: 40px; height: 40px; background: linear-gradient(135deg, var(--blue), var(--gold)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: white; flex-shrink: 0; }
  .header-info { flex: 1; }
  .header-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: white; }
  .header-status { font-size: 12px; color: rgba(255,255,255,0.6); display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .header-logo { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.4); }
  .header-logo span { color: var(--gold); }
  #messages { flex: 1; overflow-y: auto; padding: 24px 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--gray2); border-radius: 4px; }
  .msg { display: flex; align-items: flex-end; gap: 8px; max-width: 88%; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar { width: 30px; height: 30px; background: linear-gradient(135deg, var(--blue), var(--gold)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 800; color: white; flex-shrink: 0; margin-bottom: 4px; }
  .bubble { padding: 12px 16px; border-radius: var(--radius); font-size: 14.5px; line-height: 1.55; max-width: 100%; word-break: break-word; }
  .msg.bot .bubble { background: white; color: var(--tx); border-bottom-left-radius: 4px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .msg.user .bubble { background: var(--blue); color: white; border-bottom-right-radius: 4px; }
  .bubble a { color: var(--blue); font-weight: 500; text-decoration: none; border-bottom: 1px solid rgba(37,99,235,0.3); }
  .msg.user .bubble a { color: rgba(255,255,255,0.9); border-color: rgba(255,255,255,0.4); }
  .bubble strong { font-weight: 600; }
  .typing-bubble { background: white; padding: 14px 18px; border-radius: var(--radius); border-bottom-left-radius: 4px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); display: flex; gap: 5px; align-items: center; }
  .typing-bubble span { width: 7px; height: 7px; background: var(--gray2); border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing-bubble span:nth-child(2){animation-delay:0.2s}
  .typing-bubble span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);background:var(--gray2)} 30%{transform:translateY(-6px);background:var(--blue2)} }
  .quick-replies { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0 4px 38px; animation: fadeUp 0.4s ease; }
  .qr-btn { background: white; border: 1.5px solid var(--blue2); color: var(--blue); padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .qr-btn:hover { background: var(--blue); color: white; border-color: var(--blue); transform: translateY(-1px); }
  .plan-cards { display: flex; flex-direction: column; gap: 10px; padding: 4px 0 4px 38px; animation: fadeUp 0.4s ease; }
  .plan-card { background: white; border: 1.5px solid var(--gray2); border-radius: 14px; padding: 14px 16px; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .plan-card.featured { border-color: var(--gold); }
  .plan-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--navy); display: flex; justify-content: space-between; align-items: center; }
  .plan-badge { font-size: 10px; font-weight: 600; background: var(--gold); color: var(--navy); padding: 2px 8px; border-radius: 10px; font-family: 'DM Sans', sans-serif; }
  .plan-price { font-size: 22px; font-weight: 700; color: var(--blue); margin: 4px 0 2px; font-family: 'Syne', sans-serif; }
  .plan-price small { font-size: 13px; font-weight: 400; color: var(--tx2); }
  .plan-desc { font-size: 12.5px; color: var(--tx2); }
  .plan-cta { display: inline-block; margin-top: 10px; background: var(--blue); color: white; padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; text-decoration: none; transition: background 0.2s; }
  .plan-cta:hover { background: #1d4ed8; color: white; border: none; }
  .plan-card.featured .plan-cta { background: var(--gold); color: var(--navy); }
  .input-area { padding: 12px 16px 20px; background: white; border-top: 1px solid var(--gray); flex-shrink: 0; display: flex; gap: 10px; align-items: flex-end; }
  #userInput { flex: 1; background: var(--bg); border: 1.5px solid var(--gray2); border-radius: 24px; padding: 11px 18px; font-size: 14.5px; font-family: 'DM Sans', sans-serif; color: var(--tx); outline: none; resize: none; max-height: 120px; transition: border-color 0.2s; line-height: 1.4; }
  #userInput:focus { border-color: var(--blue2); }
  #userInput::placeholder { color: var(--tx3); }
  #sendBtn { width: 44px; height: 44px; background: var(--blue); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; color: white; }
  #sendBtn:hover { background: #1d4ed8; transform: scale(1.05); }
  #sendBtn:disabled { background: var(--gray2); cursor: not-allowed; transform: none; }
  .date-sep { text-align: center; font-size: 11.5px; color: var(--tx3); padding: 4px 0; }
</style>
</head>
<body>
<header>
  <div class="avatar">C</div>
  <div class="header-info">
    <div class="header-name">Conta</div>
    <div class="header-status"><div class="status-dot"></div>Asistente en línea</div>
  </div>
  <div class="header-logo">Conta<span>Fiscal MX</span></div>
</header>
<div id="messages"><div class="date-sep">Hoy</div></div>
<div class="input-area">
  <textarea id="userInput" placeholder="Escribe tu mensaje..." rows="1"></textarea>
  <button id="sendBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
      <line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>
  </button>
</div>
<script>
const FUNCTION_URL = "https://us-central1-contafiscalmx-1dd76.cloudfunctions.net/chat";
let conversationHistory = [];
let isThinking = false;
const messagesDiv = document.getElementById('messages');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

function scrollBottom() { setTimeout(() => messagesDiv.scrollTop = messagesDiv.scrollHeight, 50); }

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>')
    .replace(/\n/g, '<br>');
}

function addMessage(text, role) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  if (role === 'bot') {
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = 'C';
    wrap.appendChild(av);
  }
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatText(text);
  wrap.appendChild(bubble);
  messagesDiv.appendChild(wrap);
  scrollBottom();
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot'; wrap.id = 'typing';
  const av = document.createElement('div');
  av.className = 'msg-avatar'; av.textContent = 'C';
  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(av); wrap.appendChild(bubble);
  messagesDiv.appendChild(wrap); scrollBottom();
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function showQuickReplies(options) {
  const div = document.createElement('div');
  div.className = 'quick-replies';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn'; btn.textContent = opt;
    btn.onclick = () => { div.remove(); sendMessage(opt); };
    div.appendChild(btn);
  });
  messagesDiv.appendChild(div); scrollBottom();
}

function showPlanCards() {
  const plans = [
    { name: 'Básico', price: '$199', period: '/mes', desc: '1 RFC · Módulos esenciales · Soporte email', link: 'https://www.paypal.com/ncp/payment/R5434CSA6TTJC', featured: false },
    { name: 'Profesional', price: '$399', period: '/mes', desc: 'Hasta 5 RFC · Todos los módulos · Soporte WhatsApp', link: 'https://www.paypal.com/ncp/payment/FR5ZWZNZF53G8', featured: true, badge: '⭐ MÁS POPULAR' },
    { name: 'Despacho', price: '$899', period: '/mes', desc: 'Hasta 50 RFC · Todo incluido · SLA 4 horas', link: 'https://www.paypal.com/ncp/payment/P7N2KF7P5E9YC', featured: false }
  ];
  const div = document.createElement('div');
  div.className = 'plan-cards';
  plans.forEach(p => {
    const card = document.createElement('div');
    card.className = `plan-card${p.featured ? ' featured' : ''}`;
    card.innerHTML = `<div class="plan-name">${p.name}${p.badge ? `<span class="plan-badge">${p.badge}</span>` : ''}</div><div class="plan-price">${p.price}<small>${p.period}</small></div><div class="plan-desc">${p.desc}</div><a href="${p.link}" target="_blank" class="plan-cta">Comenzar 10 días gratis →</a>`;
    div.appendChild(card);
  });
  messagesDiv.appendChild(div); scrollBottom();
}

async function sendMessage(text) {
  const msg = text || userInput.value.trim();
  if (!msg || isThinking) return;
  userInput.value = ''; userInput.style.height = 'auto';
  isThinking = true; sendBtn.disabled = true;
  addMessage(msg, 'user');
  conversationHistory.push({ role: 'user', content: msg });
  showTyping();
  try {
    const response = await fetch(FUNCTION_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });
    const data = await response.json();
    const reply = data.reply;
    conversationHistory.push({ role: 'assistant', content: reply });
    removeTyping();
    addMessage(reply, 'bot');
    const lower = reply.toLowerCase();
    if (lower.includes('básico') && lower.includes('profesional')) setTimeout(() => showPlanCards(), 300);
    const lowerMsg = msg.toLowerCase();
    if (lowerMsg.includes('hola') || lowerMsg.includes('buenas') || lowerMsg.includes('info')) {
      setTimeout(() => showQuickReplies(['¿Cuánto cuesta?', '¿Qué módulos incluye?', 'Quiero una demo', 'Ya soy cliente']), 400);
    }
  } catch (err) {
    removeTyping();
    addMessage('Lo siento, hubo un problema. Escríbenos al WhatsApp: **+52 667 307 6755** 📱', 'bot');
  }
  isThinking = false; sendBtn.disabled = false;
}

sendBtn.addEventListener('click', () => sendMessage());
userInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
userInput.addEventListener('input', () => { userInput.style.height = 'auto'; userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px'; });

window.addEventListener('load', () => {
  setTimeout(() => {
    addMessage('¡Hola! 👋 Soy **Conta**, tu asistente de **ContaFiscal MX 2026**.\n\n¿En qué te puedo ayudar hoy?', 'bot');
    setTimeout(() => showQuickReplies(['¿Cuánto cuesta?', '¿Qué hace el sistema?', 'Quiero una demo', 'Ya soy cliente']), 500);
  }, 600);
});
</script>
</body>
</html>
